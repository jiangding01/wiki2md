<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>wiki2md 设置</title>
  <style>
    :root {
      --bg: #f2f7fb;
      --bg2: #edf4ea;
      --card: #ffffff;
      --ink: #10243e;
      --muted: #5a6a7e;
      --line: #d3deea;
      --brand: #0f5cc0;
      --brand-strong: #0b4ea5;
      --ok: #13724d;
      --warn: #9a6a1e;
      --err: #b92f2f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top right, #ffffff 0%, var(--bg) 52%, var(--bg2) 100%);
      color: var(--ink);
      font-family: "Avenir Next", "SF Pro Rounded", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 22px 18px 120px;
    }

    .hero {
      border: 1px solid var(--line);
      background: linear-gradient(170deg, #f8fbff, #f1f8f1);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(18, 48, 89, 0.08);
      margin-bottom: 14px;
    }

    .hero-tag {
      display: inline-block;
      font-size: 11px;
      color: #2f629f;
      border: 1px solid #b9d2f4;
      background: #eaf3ff;
      border-radius: 999px;
      padding: 3px 8px;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: 0.2px;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .hero-meta {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      border-radius: 999px;
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: #355778;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: var(--card);
      box-shadow: 0 6px 18px rgba(18, 49, 87, 0.05);
    }

    h2 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .muted {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    textarea,
    input[type="number"] {
      width: 100%;
      border: 1px solid #c5d4e6;
      border-radius: 10px;
      padding: 10px;
      background: #fcfdff;
      color: var(--ink);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    textarea {
      min-height: 130px;
      font-size: 12px;
      line-height: 1.45;
      font-family: "Iosevka Fixed", "JetBrains Mono", "SFMono-Regular", Menlo, Consolas, monospace;
      resize: vertical;
    }

    textarea:focus,
    input[type="number"]:focus,
    input[type="range"]:focus,
    button:focus-visible {
      outline: none;
      border-color: #76a9ef;
      box-shadow: 0 0 0 3px rgba(68, 132, 222, 0.18);
    }

    .field-row {
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .field-meta {
      font-size: 12px;
      color: #4f6582;
    }

    .ghost-btn {
      border: 1px solid #c6d5e8;
      border-radius: 9px;
      background: #fff;
      color: #2c4c73;
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
    }

    .toggle-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .toggle {
      border: 1px solid #d8e2ee;
      border-radius: 10px;
      padding: 9px 10px;
      background: #fbfdff;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: #1c3858;
    }

    .toggle input {
      margin-top: 2px;
      width: 16px;
      height: 16px;
      accent-color: var(--brand);
    }

    .toggle small {
      display: block;
      color: #647b96;
      margin-top: 2px;
      font-size: 11px;
    }

    .range-wrap {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 96px;
      gap: 10px;
      align-items: center;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--brand);
      cursor: pointer;
    }

    .actions {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      border-top: 1px solid #cedaea;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      padding: 12px 16px;
    }

    .actions-inner {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btns {
      display: flex;
      gap: 8px;
    }

    button {
      border: 1px solid #c6d5e8;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      background: #fff;
      color: #27476c;
    }

    button.primary {
      border: none;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-strong));
      box-shadow: 0 8px 18px rgba(13, 84, 174, 0.3);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .status {
      min-height: 20px;
      font-size: 12px;
      color: #365979;
      border: 1px solid #cfe0f2;
      border-radius: 9px;
      padding: 6px 10px;
      background: #f3f8fe;
    }

    .status.success {
      color: var(--ok);
      border-color: #b8dfce;
      background: #edf9f3;
    }

    .status.error {
      color: var(--err);
      border-color: #edc4c4;
      background: #fff1f1;
    }

    .status.warn {
      color: var(--warn);
      border-color: #edd8b7;
      background: #fff8ea;
    }

    @media (max-width: 720px) {
      .page {
        padding: 14px 12px 120px;
      }

      h1 {
        font-size: 24px;
      }

      .range-wrap {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <span class="hero-tag">wiki2md 设置页</span>
      <h1>导出配置中心</h1>
      <p class="desc">按你的团队规范调整导出行为。推荐修改后先在一篇页面上试导一次，确认结果再批量使用。</p>
      <div class="hero-meta">
        <span class="chip" id="last_saved">最近保存：尚未更新</span>
        <span class="chip" id="dirty_hint">当前状态：已同步</span>
      </div>
    </header>

    <section class="grid">
      <div class="card">
        <h2>站点允许列表（可选）</h2>
        <p class="muted">留空表示允许全部站点。每行一个域名，支持通配符，例如 <code>*.example.com</code>。</p>
        <textarea id="allowlist" placeholder="confluence.example.com&#10;*.corp.example.com"></textarea>
        <div class="field-row">
          <span class="field-meta" id="allowlist_meta">0 条规则</span>
          <button type="button" class="ghost-btn" id="normalize_allowlist">整理列表</button>
        </div>
      </div>

      <div class="card">
        <h2>平台开关</h2>
        <p class="muted">当前稳定支持 Confluence，其他平台开关保留为后续扩展入口。</p>
        <div class="toggle-list">
          <label class="toggle">
              <input type="checkbox" id="platform_confluence">
              <span>
              Confluence（知识库）
              <small>建议保持开启，当前导出能力已针对该平台优化。</small>
            </span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="platform_feishu">
            <span>
              飞书文档（即将支持）
              <small>预留开关，当前版本不会在该平台提供完整导出能力。</small>
            </span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="platform_wechat">
            <span>
              微信文档（即将支持）
              <small>预留开关，当前版本不会在该平台提供完整导出能力。</small>
            </span>
          </label>
        </div>
      </div>

      <div class="card">
        <h2>导出行为</h2>
        <p class="muted">这些设置会影响 Markdown 可读性与导出性能，可按内容类型灵活调整。</p>
        <div class="toggle-list">
          <label class="toggle">
            <input type="checkbox" id="rewrite_links">
            <span>
              相对链接改写为绝对链接
              <small>建议开启，离线阅读和跨环境复用更稳定。</small>
            </span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="force_md_tables">
            <span>
              简单表格强制转换为 Markdown 表格
              <small>复杂表格仍保留精简 HTML，以减少结构损失。</small>
            </span>
          </label>
        </div>

        <div class="range-wrap">
          <input type="range" min="1" max="12" step="1" id="img_concurrency_range">
          <input type="number" min="1" max="12" id="img_concurrency">
        </div>
        <div class="field-row">
          <span class="field-meta" id="concurrency_meta">图片下载并发：6（推荐 4-6）</span>
        </div>
      </div>
    </section>
  </main>

  <div class="actions">
    <div class="actions-inner">
      <div class="btns">
        <button class="primary" id="save" type="button">保存设置</button>
        <button id="reset" type="button">恢复默认</button>
      </div>
      <div id="status" class="status" role="status" aria-live="polite">已加载配置。</div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
